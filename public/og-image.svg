<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="300" fill="#3b82f6" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#10b981" opacity="0.1"/>

  <!-- Logo/Icon -->
  <rect x="500" y="180" width="200" height="200" rx="40" fill="url(#accent)"/>
  <path d="M560 280 L600 240 L640 280 L640 340 L560 340 Z" fill="white" opacity="0.9"/>
  <rect x="570" y="300" width="120" height="20" rx="4" fill="white" opacity="0.7"/>

  <!-- Title -->
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, sans-serif" font-size="56" font-weight="bold" fill="white">ATK-Sync POS</text>

  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, sans-serif" font-size="24" fill="#94a3b8">Sistem Point of Sale Modern</text>

  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#1e293b"/>
  <text x="600" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#64748b">Point of Sale Solution</text>
</svg>